<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind Group</title>
  <link rel="stylesheet" href="./src/output.css">
</head>
<body>

  <!-- Header -->
  <header class="flex items-center justify-between px-4 py-3 bg-white border-b border-gray-100 md:px-8">
  
  <div class="flex items-center flex-1 gap-8">
    
    <a href="#" class="flex-shrink-0">
      <img src="./img/Logo Vector.png" alt="Logo" class="h-8 w-auto">
    </a>

    <div class="hidden md:relative md:block w-full max-w-md">
      <input 
        type="text" 
        placeholder="Search bar" 
        class="w-full py-2 pl-4 pr-10 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all"
      >
      <div class="absolute right-3 top-2.5 text-gray-400">
        <svg xmlns="http://w3.org" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
    </div>
  </div>

  <div class="flex items-center gap-6">
    <nav class="hidden md:flex items-center gap-6 text-sm font-semibold text-slate-700">
      <button class="flex items-center gap-1 hover:text-pink-600 transition-colors">
        Category
        <svg xmlns="http://w3.org" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <a href="#" class="hover:text-pink-600 transition-colors">Become an Mentor</a>
    </nav>

    <div class="flex items-center gap-3">
      <button class="px-5 py-2 text-sm font-semibold text-slate-700 border border-gray-300 rounded-lg hover:bg-gray-50 transition-all">
        Login
      </button>
      <button class="px-5 py-2 text-sm font-semibold text-white bg-pink-500 rounded-lg hover:bg-pink-600 shadow-md shadow-pink-200 transition-all">
        Sign Up
      </button>
    </div>
  </div>
</header>
  


</body>
</html>
